<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RobotPlanet - Arena</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; max-width: 820px; padding: 0 4px; }
  canvas {
    border: 2px solid #4a4aff;
    border-radius: 12px;
    cursor: crosshair;
    display: block;
    width: 100%;
    max-width: 800px;
    height: auto;
    aspect-ratio: 800 / 500;
    touch-action: none;
  }
  .panel {
    width: 100%;
    max-width: 800px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .weapon-bar { display: flex; gap: 4px; flex: 1; }
  .w-btn {
    background: rgba(20,20,60,0.9);
    border: 1px solid #3a3a8a;
    border-radius: 8px;
    padding: 6px 4px;
    color: #e0e0ff;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    text-align: center;
    transition: all 0.1s;
    flex: 1;
    min-width: 0;
  }
  .w-btn:hover { border-color: #6a6aff; background: rgba(40,40,100,0.9); }
  .touch-mode .w-btn { padding: 10px 4px; font-size: 13px; }
  .touch-mode .w-btn .key { font-size: 11px; }
  .touch-mode .w-btn .wname { font-size: 14px; }
  .w-btn.active {
    border-color: #ffdd44;
    background: rgba(80,70,30,0.9);
    box-shadow: 0 0 15px rgba(255,221,68,0.4), inset 0 0 15px rgba(255,221,68,0.1);
  }
  .w-btn .key { font-size: 9px; color: #8888cc; display: block; }
  .w-btn .wname { font-weight: bold; font-size: 12px; }
  .w-btn.active .wname { color: #ffdd44; text-shadow: 0 0 10px rgba(255,221,68,0.5); }

  .hp-section { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 2px; }
  .hp-row { display: flex; gap: 8px; align-items: center; }
  .hp-label { font-weight: bold; font-size: 12px; min-width: 90px; white-space: nowrap; }
  .hp-label.player { color: #44ff88; text-shadow: 0 0 10px rgba(68,255,136,0.3); }
  .hp-label.ai { color: #ff4444; text-shadow: 0 0 10px rgba(255,68,68,0.3); }
  .hp-bar-outer {
    background: #1a1a3a;
    border-radius: 6px;
    height: 16px;
    border: 1px solid #3a3a6a;
    flex: 1;
    overflow: hidden;
  }
  .hp-bar-inner {
    height: 100%;
    border-radius: 6px;
    transition: width 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: bold;
    color: #fff;
  }
  .hp-bar-inner::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 50%;
    background: rgba(255,255,255,0.15);
    border-radius: 6px 6px 0 0;
  }
  .hp-green { background: linear-gradient(90deg, #44ff88, #22cc66); }
  .hp-orange { background: linear-gradient(90deg, #ffaa44, #ff8800); }
  .hp-red { background: linear-gradient(90deg, #ff4444, #cc2222); animation: hpPulse 0.4s infinite alternate; }
  @keyframes hpPulse { 0% { opacity: 1; } 100% { opacity: 0.6; } }
  .hp-bar-inner { position: relative; }

  .shield-badge { font-size: 10px; color: #66ccff; min-width: 40px; text-align: center; }
  .stun-badge { font-size: 10px; color: #ff66aa; min-width: 40px; text-align: center; animation: stunPulse 0.3s infinite alternate; }
  @keyframes stunPulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

  .controls-hint { color: rgba(102,102,170,0.6); font-size: 11px; white-space: nowrap; text-align: right; }
  .controls-hint kbd {
    background: rgba(102,102,170,0.15);
    border: 1px solid rgba(102,102,170,0.3);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
  }

  .diff-btn {
    background: rgba(20,20,60,0.9); border: 1px solid #3a3a8a;
    border-radius: 8px; padding: 8px 14px; color: #e0e0ff;
    font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .diff-btn:hover { border-color: #6a6aff; }
  .diff-btn.active { border-color: #ff8844; background: rgba(80,50,30,0.9); box-shadow: 0 0 15px rgba(255,136,68,0.3); }
  .mode-btn {
    background: rgba(20,20,60,0.9); border: 1px solid #3a3a8a;
    border-radius: 8px; padding: 8px 14px; color: #e0e0ff;
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: #6a6aff; }
  .mode-btn.active { border-color: #44ff88; background: rgba(30,80,50,0.9); box-shadow: 0 0 15px rgba(68,255,136,0.3); }

  #fireBtn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,50,50,0.7);
    border: 3px solid rgba(255,100,100,0.9);
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    font-family: inherit;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
    box-shadow: 0 0 25px rgba(255,0,0,0.4);
    touch-action: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #fireBtn:active { transform: scale(0.9); background: rgba(255,0,0,0.9); }
  #fireBtn.show { display: flex; }

  .canvas-wrap { position: relative; width: 100%; max-width: 800px; aspect-ratio: 800 / 500; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75); border-radius: 12px;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
    z-index: 5; backdrop-filter: blur(4px);
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .overlay h1 { font-size: 52px; margin-bottom: 5px; letter-spacing: 4px; }
  .overlay .win { color: #44ff88; text-shadow: 0 0 40px rgba(68,255,136,0.6); }
  .overlay .lose { color: #ff4444; text-shadow: 0 0 40px rgba(255,68,68,0.6); }
  .overlay p { font-size: 18px; color: #ccc; margin-bottom: 5px; }
  .overlay .sub { font-size: 14px; color: #888; }
  .overlay button {
    margin-top: 15px; background: linear-gradient(135deg, #4a4aff, #2a2acc);
    border: none; border-radius: 10px; padding: 14px 40px;
    color: #fff; font-size: 18px; font-weight: bold; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
    box-shadow: 0 0 30px rgba(74,74,255,0.3);
  }
  .overlay button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 50px rgba(74,74,255,0.6); }

  .start-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0e0e2e, #040410);
    border-radius: 12px; z-index: 10;
    overflow: hidden;
  }
  .start-screen::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(68,68,255,0.03) 2px, rgba(68,68,255,0.03) 4px);
    pointer-events: none;
  }
  .lobby-header {
    position: relative; display: flex; flex-direction: column; align-items: center;
    margin-bottom: 16px;
  }
  .lobby-header h1 {
    font-size: 38px; color: #ffdd44;
    text-shadow: 0 0 40px rgba(255,221,68,0.3), 0 0 80px rgba(255,221,68,0.1);
    letter-spacing: 8px; margin: 0;
  }
  .lobby-header h1 .bolt { color: #88aaff; }
  .lobby-header .tagline {
    color: #5555aa; font-size: 11px; letter-spacing: 4px;
    margin-top: 2px; text-transform: uppercase;
  }
  .lobby-header .tagline span { color: #ffdd44; }
  .lobby-card {
    position: relative;
    background: rgba(10,10,35,0.85);
    border: 1px solid rgba(74,74,255,0.2);
    border-radius: 12px; padding: 14px 20px 18px;
    width: 340px; max-width: 90%;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 30px rgba(30,30,80,0.4), inset 0 0 30px rgba(30,30,80,0.15);
  }
  .lobby-card .card-title {
    color: #6666bb; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 2px;
  }
  .lobby-row {
    display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
  }
  .lobby-row .label {
    color: #7777aa; font-size: 12px; min-width: 90px; text-align: right;
  }
  .start-screen input {
    background: rgba(20,20,60,0.9); border: 1px solid rgba(74,74,255,0.3);
    border-radius: 8px; padding: 8px 14px; color: #e0e0ff;
    font-size: 15px; font-family: inherit; text-align: center;
    width: 180px; outline: none; transition: border-color 0.2s;
  }
  .start-screen input:focus { border-color: #6a6aff; }
  .mode-toggle {
    display: flex; gap: 0; width: 100%;
    border: 1px solid rgba(74,74,255,0.2); border-radius: 8px; overflow: hidden;
  }
  .mode-toggle .mode-main-btn {
    flex: 1; background: rgba(20,20,60,0.6); border: none; border-radius: 0;
    padding: 9px 16px; color: #8888bb; font-size: 13px; font-weight: bold;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .mode-toggle .mode-main-btn:hover { background: rgba(40,40,100,0.6); color: #bbb; }
  .mode-toggle .mode-main-btn.active { background: rgba(30,80,50,0.7); color: #44ff88; box-shadow: inset 0 0 15px rgba(68,255,136,0.1); }
  .btn-group {
    display: flex; gap: 6px;
  }
  .btn-group .enemy-btn, .btn-group .diff-btn, .btn-group .mode-btn {
    background: rgba(20,20,60,0.8); border: 1px solid rgba(58,58,138,0.4);
    border-radius: 6px; padding: 6px 14px; color: #9999cc;
    font-size: 13px; font-weight: bold; cursor: pointer; font-family: inherit;
    transition: all 0.12s;
  }
  .btn-group .enemy-btn:hover, .btn-group .diff-btn:hover, .btn-group .mode-btn:hover { border-color: #6a6aff; color: #ccc; }
  .btn-group .enemy-btn.active { border-color: #ffdd44; color: #ffdd44; background: rgba(80,70,30,0.7); box-shadow: 0 0 12px rgba(255,221,68,0.2); }
  .btn-group .diff-btn.active { border-color: #ff8844; color: #ff8844; background: rgba(80,50,30,0.7); box-shadow: 0 0 12px rgba(255,136,68,0.2); }
  .btn-group .mode-btn.active { border-color: #44ff88; color: #44ff88; background: rgba(30,80,50,0.7); box-shadow: 0 0 12px rgba(68,255,136,0.2); }
  .mp-actions {
    display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%;
  }
  .mp-actions .mp-btn {
    background: linear-gradient(135deg, #4a4aff, #2a2acc);
    border: none; border-radius: 8px; padding: 9px 18px; color: #fff;
    font-size: 13px; font-weight: bold; cursor: pointer; font-family: inherit;
    transition: all 0.15s; box-shadow: 0 0 12px rgba(74,74,255,0.15);
    width: 100%; max-width: 200px;
  }
  .mp-actions .mp-btn:hover { transform: scale(1.04); box-shadow: 0 0 20px rgba(74,74,255,0.4); }
  .mp-actions .mp-btn.secondary { background: rgba(40,40,80,0.8); box-shadow: none; }
  .mp-actions .mp-btn.secondary:hover { background: rgba(60,60,120,0.9); }
  .mp-join-row { display: flex; gap: 6px; width: 100%; max-width: 260px; }
  .mp-join-row input {
    flex: 1; background: rgba(20,20,60,0.9); border: 1px solid rgba(74,74,255,0.3);
    border-radius: 6px; padding: 7px 10px; color: #e0e0ff;
    font-size: 14px; font-family: inherit; text-align: center; outline: none;
    width: auto;
  }
  .mp-join-row input:focus { border-color: #6a6aff; }
  .mp-join-row .mp-btn { max-width: none; width: auto; padding: 7px 14px; }
  .lobby-btn {
    background: linear-gradient(135deg, #ffdd44, #ffaa00);
    border: none; border-radius: 10px; padding: 12px 48px;
    color: #1a1a3a; font-size: 19px; font-weight: bold; cursor: pointer;
    font-family: inherit; transition: all 0.2s; margin-top: 4px;
    box-shadow: 0 0 25px rgba(255,221,68,0.25); letter-spacing: 3px;
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .lobby-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 0 50px rgba(255,221,68,0.5); animation: none; }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 25px rgba(255,221,68,0.2); }
    50% { box-shadow: 0 0 45px rgba(255,221,68,0.45); }
  }
  .lobby-footer {
    position: absolute; bottom: 8px;
    color: rgba(68,68,136,0.3); font-size: 9px; letter-spacing: 1px;
  }
  .mp-status { font-size: 13px; color: #8888cc; margin: 8px 0; text-align: center; }

  .combo-display {
    position: absolute; top: 10px; right: 15px;
    font-size: 24px; font-weight: bold; color: #ffdd44;
    text-shadow: 0 0 20px rgba(255,221,68,0.5);
    opacity: 0; transition: opacity 0.3s; z-index: 2; pointer-events: none;
  }
  .combo-display.show { opacity: 1; }

  #errorConsole {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92); color: #ff6666;
    font: 12px monospace; padding: 6px 12px;
    max-height: 120px; overflow-y: auto; z-index: 999;
    border-top: 2px solid #ff4444; display: none;
    white-space: pre-wrap; word-break: break-all;
  }
  #errorConsole.show { display: block; }
  #errorConsole .err { color: #ff6666; }
  #errorConsole .warn { color: #ffaa44; }
  #errorConsole .info { color: #66ccff; }
  #errorToggle {
    position: fixed; bottom: 4px; right: 4px; z-index: 1000;
    background: rgba(255,50,50,0.7); border: 1px solid rgba(255,100,100,0.5);
    border-radius: 4px; padding: 2px 8px; color: #fff;
    font: bold 11px monospace; cursor: pointer; display: none;
  }
  #errorToggle:hover { background: rgba(255,50,50,0.9); }
</style>
</head>
<body>
<div id="errorConsole"></div>
<button id="errorToggle">LOG</button>

<div class="wrapper">
  <div class="hp-section" id="hpSection">
    <div class="hp-row" id="playerHpRow">
      <span class="hp-label player" id="pName">PLAYER</span>
      <div class="hp-bar-outer"><div class="hp-bar-inner hp-green" id="pHpBar" style="width:100%">100</div></div>
      <span class="shield-badge" id="pShield"></span>
      <span class="stun-badge" id="pStun"></span>
    </div>
    <div id="enemyHpRows"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="arena" width="800" height="500"></canvas>
    <div class="combo-display" id="comboDisplay"></div>
    <button id="fireBtn">🔥<br>FIRE</button>
    <div class="start-screen" id="startScreen">
      <div class="lobby-header">
        <h1><span class="bolt">⚡</span> ROBOTPLANET</h1>
        <div class="tagline"><span>—</span> battle arena <span>—</span></div>
      </div>

      <div class="lobby-card">
        <div class="card-title">— Settings —</div>

        <div id="modeToggle" class="mode-toggle">
          <button class="mode-main-btn active" onclick="setGameMode('single')">Singleplayer</button>
          <button class="mode-main-btn" onclick="setGameMode('multi')">Multiplayer</button>
        </div>

        <div class="lobby-row">
          <input type="text" id="nameInput" value="MechWarrior" maxlength="20" placeholder="Robot name">
        </div>

        <div id="singleOptions" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:8px">
          <div class="lobby-row">
            <span class="label">Opponents</span>
            <div class="btn-group">
              <button class="enemy-btn active" onclick="setEnemyCount(1)">1</button>
              <button class="enemy-btn" onclick="setEnemyCount(2)">2</button>
              <button class="enemy-btn" onclick="setEnemyCount(3)">3</button>
            </div>
          </div>
          <div class="lobby-row">
            <span class="label">Controls</span>
            <div class="btn-group">
              <button class="mode-btn active" onclick="setControlMode('kbm')">K&amp;M</button>
              <button class="mode-btn" onclick="setControlMode('touch')">Touch</button>
            </div>
          </div>
          <div class="lobby-row">
            <span class="label">Difficulty</span>
            <div class="btn-group">
              <button class="diff-btn active" onclick="setDifficulty(0)">Easy</button>
              <button class="diff-btn" onclick="setDifficulty(1)">Normal</button>
              <button class="diff-btn" onclick="setDifficulty(2)">Hard</button>
            </div>
          </div>
        </div>

        <div id="multiOptions" style="display:none;width:100%">
          <div class="mp-actions">
            <button class="mp-btn" onclick="createRoom()">📡 New Room</button>
            <span style="color:#5555aa;font-size:11px">— or —</span>
            <div class="mp-join-row">
              <input type="text" id="roomCodeInput" placeholder="Room code" maxlength="6">
              <button class="mp-btn" onclick="joinRoom()">Join</button>
            </div>
            <div class="mp-status" id="mpStatus" style="display:none"></div>
            <button class="mp-btn secondary" id="leaveRoomBtn" onclick="leaveRoom()" style="display:none">✕ Leave</button>
          </div>
        </div>

        <button class="lobby-btn" onclick="startGame()" id="startBtn">⚔ FIGHT</button>
      </div>

      <div class="lobby-footer">ROBOTPLANET v1.0</div>
    </div>
    <div class="overlay" id="gameOverlay">
      <h1 id="resultTitle">🏆 VICTORY!</h1>
      <p id="resultMsg"></p>
      <p class="sub" id="resultRounds"></p>
      <button onclick="backToLobby()">⚔️ PLAY AGAIN</button>
    </div>
  </div>

  <div class="panel">
    <div class="weapon-bar" id="weaponBar"></div>
    <div class="controls-hint" id="controlsHint">
      <kbd>W A S D</kbd> move &nbsp;|&nbsp; <kbd>1-5</kbd> weapon &nbsp;|&nbsp; <kbd>Click</kbd> / <kbd>Space</kbd> fire
    </div>
  </div>
</div>

<script>
var errConsole = document.getElementById('errorConsole');
var errorToggle = document.getElementById('errorToggle');
errorToggle.addEventListener('click', function() {
  errConsole.classList.toggle('show');
  errorToggle.textContent = errConsole.classList.contains('show') ? 'VERB' : 'LOG';
});
function logToConsole(msg, type) {
  if (!type) type = 'err';
  errorToggle.style.display = 'block';
  errConsole.classList.add('show');
  errorToggle.textContent = 'VERB';
  var div = document.createElement('div');
  div.className = type;
  div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  errConsole.appendChild(div);
  errConsole.scrollTop = errConsole.scrollHeight;
}
window.onerror = function(msg, url, line) {
  logToConsole(msg + ' (line ' + line + ')');
  return true;
};
window.addEventListener('unhandledrejection', function(e) {
  logToConsole('Promise: ' + e.reason);
});

var canvas = document.getElementById('arena');
var ctx = canvas.getContext('2d');
logToConsole('Game loaded. Canvas ' + canvas.width + 'x' + canvas.height, 'info');

var W = 800, H = 500;
var bgImage = new Image();
bgImage.src = '2d landscape.webp';
var bgLoaded = false;
bgImage.onload = function() { bgLoaded = true; logToConsole('Background loaded (' + bgImage.width + 'x' + bgImage.height + ')', 'info'); };

var weapons = [
  { name: "Laser",    damage: 25, accuracy: 0.90, speed: 14, color: "#ff2222", size: 5,  desc: "High precision" },
  { name: "Rocket",   damage: 50, accuracy: 0.50, speed: 8,  color: "#ff8800", size: 8,  desc: "Devastating" },
  { name: "Shield",   damage: 0,  accuracy: 1.0,  speed: 0,  color: "#44ddff", size: 0,  desc: "Block + heal", special: "defend" },
  { name: "EMP",      damage: 18, accuracy: 0.75, speed: 12, color: "#dd44ff", size: 6,  desc: "Stuns enemy", special: "stun" },
  { name: "Minigun",  damage: 8,  accuracy: 0.85, speed: 16, color: "#ffdd44", size: 3,  desc: "4 shots/turn", special: "multi" },
];

var player, enemies = [];
var projectiles = [], explosions = [], particles = [], sparks = [], hitTexts = [];
var keys = {};
var selectedWeapon = 0, gameActive = false, canShoot = true;
var shootCooldown = 0, screenShake = { x: 0, y: 0, intensity: 0 };
var enemyCount = 1;
var controlMode = 'kbm';
var joystick = { active: false, centerX: 0, centerY: 0, dx: 0, dy: 0, dist: 0, touchId: -1 };
var aimActive = false, aimDragged = false, aimX = 0, aimY = 0, aimTouchId = -1;
var mouseX = 0, mouseY = 0, fireBtnHeld = false;

document.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

function setControlMode(mode) {
  controlMode = mode;
  var btns = document.querySelectorAll('.mode-btn');
  for (var i = 0; i < btns.length; i++) {

// Touch handling
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

function handleTouch(e) {
  if (controlMode !== 'touch' || !gameActive) return;
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var fireBtnRect = document.getElementById('fireBtn').getBoundingClientRect();
  var activeJoystick = false, activeAim = false;
  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    var tx = (t.clientX - rect.left) * scaleX;
    var ty = (t.clientY - rect.top) * scaleY;
    if (t.clientX >= fireBtnRect.left && t.clientX <= fireBtnRect.right &&
        t.clientY >= fireBtnRect.top && t.clientY <= fireBtnRect.bottom) {
      continue;
    }
    if (tx > canvas.width * 0.5) {
      // Right side — aim zone
      activeAim = true;
      aimActive = true;
      if (t.identifier !== aimTouchId) {
        aimTouchId = t.identifier;
        aimDragged = false;
        aimX = tx;
        aimY = ty;
      } else {
        var adx = tx - aimX;
        var ady = ty - aimY;
        if (adx*adx + ady*ady > 100) aimDragged = true;
        aimX = tx;
        aimY = ty;
      }
    } else {
      // Left side — joystick (drive + aim)
      activeJoystick = true;
      activeAim = true;
      if (t.identifier !== joystick.touchId) {
        joystick.active = true;
        joystick.centerX = tx;
        joystick.centerY = ty;
        joystick.dx = 0;
        joystick.dy = 0;
        joystick.dist = 0;
        joystick.touchId = t.identifier;
        aimActive = true;
        aimDragged = false;
        aimX = tx;
        aimY = ty;
      } else {
        var ddx = tx - joystick.centerX;
        var ddy = ty - joystick.centerY;
        var dist = Math.sqrt(ddx*ddx + ddy*ddy);
        var maxDist = 60;
        var clamped = Math.min(dist, maxDist);
        joystick.dist = clamped / maxDist;
        if (dist > 5) {
          joystick.dx = ddx / dist;
          joystick.dy = ddy / dist;
        } else {
          joystick.dx = 0;
          joystick.dy = 0;
        }
        aimActive = true;
        aimX = joystick.centerX + joystick.dx * maxDist * joystick.dist;
        aimY = joystick.centerY + joystick.dy * maxDist * joystick.dist;
        aimDragged = joystick.dist > 0.1;
      }
    }
  }
  if (!activeJoystick) {
    joystick.active = false;
    joystick.dx = 0;
    joystick.dy = 0;
    joystick.dist = 0;
    joystick.touchId = -1;
  }
  if (!activeAim) {
    aimActive = false;
  }
}

function handleTouchEnd(e) {
  if (controlMode !== 'touch') return;
  // Check if JOYSTICK touch ended — fire in joystick direction
  for (var ci = 0; ci < e.changedTouches.length; ci++) {
    if (e.changedTouches[ci].identifier === joystick.touchId && joystick.active) {
      if (joystick.dist > 0.1) {
        var jx = joystick.centerX + joystick.dx * 60 * joystick.dist;
        var jy = joystick.centerY + joystick.dy * 60 * joystick.dist;
        playerShootAt(jx, jy);
      } else {
        playerShootAuto();
      }
    }
  }
  // Check if RIGHT SIDE aim touch ended — fire
  for (var ci = 0; ci < e.changedTouches.length; ci++) {
    if (e.changedTouches[ci].identifier === aimTouchId && aimActive) {
      if (aimDragged) {
        playerShootAt(aimX, aimY);
      } else {
        playerShootAuto();
      }
    }
  }
  if (e.touches.length > 0) {
    handleTouch(e);
    return;
  }
  joystick.active = false;
  joystick.dx = 0;
  joystick.dy = 0;
  joystick.dist = 0;
  joystick.touchId = -1;
  aimActive = false;
  aimDragged = false;
  aimTouchId = -1;
}

function subscribeToRoom() {
  logToConsole('Subscribing to room ' + roomCode, 'info');
  mpChannel = supabaseClient.channel('room-' + roomCode);
  // State via Broadcast (fast, no DB)
  mpChannel.on('broadcast', { event: 'state' }, function(msg) {
    var data = msg.payload || msg;
    if (data.player_id === playerId) return;
    if (!mpOpponent) {
      mpOpponent = new RobotArena(data.name || 'Opponent', data.x || 650, data.y || 250, false);
      mpOpponent.color = '#ff4444';
      mpOpponent.isPlayer = false;
      mpOpponent.hp = data.hp || 200;
      mpOpponent.maxHp = data.max_hp || 200;
      if (gameActive && enemies.indexOf(mpOpponent) === -1) enemies.push(mpOpponent);
      document.getElementById('mpStatus').textContent = 'Opponent found!';
      if (!gameActive) setTimeout(function() { startGame(); }, 300);
    } else {
      mpOpponent.targetX = data.x || mpOpponent.targetX;
      mpOpponent.targetY = data.y || mpOpponent.targetY;
      mpOpponent.hp = data.hp !== undefined ? data.hp : mpOpponent.hp;
      mpOpponent.maxHp = data.max_hp || mpOpponent.maxHp;
      mpOpponent.targetBodyAngle = data.body_angle || mpOpponent.targetBodyAngle;
      mpOpponent.targetTurretAngle = data.turret_angle || mpOpponent.targetTurretAngle;
      mpOpponent.shield = data.shield || mpOpponent.shield;
      mpOpponent.stunned = data.stunned !== undefined ? data.stunned : mpOpponent.stunned;
      mpOpponent.weapon = data.weapon;
      mpOpponent.shakeTimer = 4;
      mpDisconnectTimer = 0;
    }
  });
  // Shots via Broadcast
  mpChannel.on('broadcast', { event: 'shot' }, function(msg) {
    var data = msg.payload || msg;
    if (data.player_id === playerId) return;
    if (!mpOpponent) { return; }
    var w = weapons[data.weapon];
    if (!w) return;
    var angle = data.angle;
    fireProjectile(data.x, data.y,
      data.x + Math.cos(angle) * 200,
      data.y + Math.sin(angle) * 200,
      w, mpOpponent);
  });
  // DB fallback (for late joiners / reconnect)
  mpChannel.on('postgres_changes',
    { event: '*', schema: 'public', table: 'player_states', filter: 'room_code=eq.' + roomCode },
    function(payload) {
      var data = payload.new;
      if (!data || data.player_id === playerId || mpOpponent) return;
      mpOpponent = new RobotArena(data.name || 'Opponent', data.x || 650, data.y || 250, false);
      mpOpponent.color = '#ff4444';
      mpOpponent.isPlayer = false;
      mpOpponent.hp = data.hp || 200;
      mpOpponent.maxHp = data.max_hp || 200;
      if (gameActive && enemies.indexOf(mpOpponent) === -1) enemies.push(mpOpponent);
      document.getElementById('mpStatus').textContent = 'Opponent found!';
      if (!gameActive) setTimeout(function() { startGame(); }, 300);
    }
  );
  mpChannel.subscribe(function(status) {
    logToConsole('Channel status: ' + status, 'info');
    if (status === 'SUBSCRIBED') {
      // Insert initial player state (DB fallback for late joiners)
      supabaseClient.from('player_states').upsert({
        room_code: roomCode, player_id: playerId, name: 'Player',
        x: isHost ? 150 : 650, y: 250, hp: 200, max_hp: 200,
        body_angle: 0, turret_angle: 0, shield: 0, stunned: false, alive: true, weapon: 0
      }, { onConflict: 'room_code,player_id' }).then(function(r) {
        if (r.error) logToConsole('init state error: ' + JSON.stringify(r.error), 'err');
      });
      document.getElementById('mpStatus').textContent = isHost ?
        'Room: ' + roomCode + ' — Waiting for opponent...' :
        'Connected to room ' + roomCode;
      // Direct hello broadcast — faster than DB replication
      if (mpChannel) {
        mpChannel.send({
          type: 'broadcast', event: 'state',
          payload: { player_id: playerId, x: isHost ? 150 : 650, y: 250, hp: 200, max_hp: 200, name: 'Player' }
        });
      }
      // Check if another player already exists via DB
      supabaseClient.from('player_states').select('*').eq('room_code', roomCode).then(function(r) {
        if (r.data && r.data.length >= 2 && !gameActive) {
          document.getElementById('mpStatus').textContent = 'Opponent found!';
          setTimeout(function() { startGame(); }, 300);
        }
      });
    }
  });
}

var aiNames = ["Terminator", "Titan", "Overlord", "Neuralis", "Annihilator", "Viper", "Crusher", "Destroyer", "Reaper", "Cyber"];

class RobotArena {
  constructor(name, x, y, isPlayer) {
    this.name = name;
    this.x = x;
    this.y = y;
    this.w = Math.round(W / 20);
    this.hp = 100;
    this.maxHp = 100;
    this.isPlayer = isPlayer;
    this.shield = 0;
    this.stunned = false;
    this.speed = 2.5 + Math.random() * 0.6;
    this.targetX = x;
    this.targetY = y;
    this.color = isPlayer ? "#2288ff" : "#ff3333";
    this.shakeTimer = 0;
    this.hitFlash = 0;
    this.shootFlash = 0;
    this.moveSway = 0;
    this.bodyAngle = isPlayer ? 0 : Math.PI;
    this.turretAngle = isPlayer ? 0 : Math.PI;
    this.targetBodyAngle = this.bodyAngle;
    this.targetTurretAngle = this.turretAngle;
    this.lastMx = 0;
    this.lastMy = 0;
    this.aiCooldown = 40 + Math.random() * 40;
  }

  alive() { return this.hp > 0; }

  takeDamage(dmg) {
    var actual = dmg;
    if (this.shield > 0) {
      var blocked = Math.min(this.shield, actual);
      this.shield -= blocked;
      actual -= blocked;
      if (blocked > 0) for (var i = 0; i < 12; i++) sparks.push(createSpark(this.x, this.y, "#66ccff"));
    }
    this.hp = Math.max(0, this.hp - actual);
    this.shakeTimer = 12;
    this.hitFlash = 8;
    screenShake.intensity = Math.max(screenShake.intensity, actual > 20 ? 10 : 5);
    return actual;
  }

  heal(amount) { this.hp = Math.min(this.maxHp, this.hp + amount); }

  update() {
    if (this.shakeTimer > 0) this.shakeTimer--;
    if (this.hitFlash > 0) this.hitFlash--;
    if (this.shootFlash > 0) this.shootFlash--;
    this.moveSway += 0.05;

    if (!this.isPlayer) {
      var dx = this.targetX - this.x;
      var dy = this.targetY - this.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) {
        this.x += (dx / dist) * this.speed * 0.65;
        this.y += (dy / dist) * this.speed * 0.65;
        this.bodyAngle = Math.atan2(dy, dx);
      }
      var pdx = player.x - this.x;
      var pdy = player.y - this.y;
      if (Math.sqrt(pdx*pdx + pdy*pdy) > 5) {
        this.turretAngle = Math.atan2(pdy, pdx);
      }
    } else {
      var mx = 0, my = 0;
      if (controlMode === 'touch') {
        if (joystick.active) {
          mx = joystick.dx * joystick.dist;
          my = joystick.dy * joystick.dist;
        }
        if (aimActive && aimDragged) {
          var adx = aimX - this.x;
          var ady = aimY - this.y;
          if (Math.sqrt(adx*adx + ady*ady) > 5) this.turretAngle = Math.atan2(ady, adx);
        } else {
          var nearest = null, nearDist = Infinity;
          for (var ei = 0; ei < enemies.length; ei++) {
            if (!enemies[ei].alive()) continue;
            var edx = enemies[ei].x - this.x;
            var edy = enemies[ei].y - this.y;
            var edist = edx*edx + edy*edy;
            if (edist < nearDist) { nearDist = edist; nearest = enemies[ei]; }
          }
          if (nearest) {
            var adx = nearest.x - this.x;
            var ady = nearest.y - this.y;
            this.turretAngle = Math.atan2(ady, adx);
          }
        }
      } else {
        if (keys['w'] || keys['arrowup']) my = -1;
        if (keys['s'] || keys['arrowdown']) my = 1;
        if (keys['a'] || keys['arrowleft']) mx = -1;
        if (keys['d'] || keys['arrowright']) mx = 1;
        if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
        var tdx = mouseX - this.x;
        var tdy = mouseY - this.y;
        if (Math.sqrt(tdx*tdx + tdy*tdy) > 5) this.turretAngle = Math.atan2(tdy, tdx);
      }
      this.x += mx * this.speed;
      this.y += my * this.speed;
      if (mx !== 0 || my !== 0) this.bodyAngle = Math.atan2(my, mx);
      this.lastMx = mx;
      this.lastMy = my;
    }
    this.x = Math.max(35, Math.min(W - 35, this.x));
    this.y = Math.max(55, Math.min(H - 35, this.y));
  }

  draw() {
    ctx.save();
    var ox = 0, oy = 0;
    if (this.shakeTimer > 0) {
      ox = (Math.random() - 0.5) * this.shakeTimer * 1.8;
      oy = (Math.random() - 0.5) * this.shakeTimer * 1.8;
    }
    ctx.translate(this.x + ox, this.y + oy);

    if (this.shield > 0) {
      for (var r = 0; r < 3; r++) {
        ctx.beginPath();
        ctx.arc(0, 0, 28 + r * 4 + Math.sin(Date.now() / 150 + r) * 3, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(68, 221, 255, ' + (0.3 - r * 0.08) + ')';
        ctx.lineWidth = 3 - r * 0.5;
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(68, 221, 255, 0.06)";
      ctx.fill();
    }

    if (this.stunned) { ctx.shadowColor = "#ff66aa"; ctx.shadowBlur = 30; }
    if (this.hitFlash > 0) { ctx.shadowColor = "#ffffff"; ctx.shadowBlur = 40; }
    if (this.shootFlash > 0) { ctx.shadowColor = this.color; ctx.shadowBlur = 25; }

    var s = this.w;
    var sway = Math.sin(this.moveSway * 3) * 1.5;

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.ellipse(0, 8, s/2 + 2, s/3, 0, 0, Math.PI * 2);
    ctx.fill();

    // BODY
    ctx.save();
    ctx.rotate(this.bodyAngle);
    ctx.fillStyle = "#445566";
    ctx.shadowBlur = 0;
    ctx.fillRect(-s/2 - 3, -s/3 + sway, 7, s * 0.68);
    ctx.fillRect(s/2 - 4, -s/3 + sway, 7, s * 0.68);
    ctx.fillStyle = "#556677";
    for (var i = 0; i < 4; i++) {
      var ty = -s/3 + 5 + i * (s * 0.68 / 4) + sway;
      ctx.fillRect(-s/2 - 1, ty, 4, 5);
      ctx.fillRect(s/2 - 3, ty, 4, 5);
    }
    var bodyGrad = ctx.createLinearGradient(-s/2, 0, s/2, 0);
    if (this.isPlayer) {
      bodyGrad.addColorStop(0, "#1a66aa"); bodyGrad.addColorStop(0.3, "#3388dd");
      bodyGrad.addColorStop(0.7, "#3388dd"); bodyGrad.addColorStop(1, "#1a66aa");
    } else {
      bodyGrad.addColorStop(0, "#aa2222"); bodyGrad.addColorStop(0.3, "#dd4444");
      bodyGrad.addColorStop(0.7, "#dd4444"); bodyGrad.addColorStop(1, "#aa2222");
    }
    ctx.fillStyle = bodyGrad;
    ctx.beginPath(); ctx.roundRect(-s/2 + 4, -s/3 + sway, s - 8, s * 0.62, 4);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-s/2 + 8, -s/4 + sway); ctx.lineTo(s/2 - 8, -s/4 + sway);
    ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.fillRect(-s/2 + 6, -s/3 + 2 + sway, s - 12, 5);

    // Exhaust smoke
    if (this.isPlayer && (this.lastMx !== 0 || this.lastMy !== 0)) {
      if (Math.random() < 0.3) {
        var rearAngle = this.bodyAngle + Math.PI;
        particles.push({
          x: this.x + Math.cos(rearAngle) * s/3,
          y: this.y + Math.sin(rearAngle) * s/3 + sway,
          vx: Math.cos(rearAngle) * (0.5 + Math.random()) + (Math.random() - 0.5) * 0.3,
          vy: Math.sin(rearAngle) * (0.5 + Math.random()) + (Math.random() - 0.5) * 0.3,
          life: 20 + Math.random() * 15, maxLife: 35,
          color: "#888899", size: 3 + Math.random() * 4, type: "smoke",
        });
      }
    }
    ctx.restore();

    // TURRET
    ctx.save();
    ctx.rotate(this.turretAngle);
    var turretR = s/4.2;
    ctx.fillStyle = this.isPlayer ? "#2277cc" : "#cc3333";
    ctx.beginPath(); ctx.arc(0, 0, turretR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, turretR, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.beginPath(); ctx.arc(0, -2, turretR * 0.45, 0, Math.PI * 2); ctx.fill();

    var barrelLen = s/2 + 8;
    ctx.strokeStyle = this.isPlayer ? "#1a5caa" : "#aa2828";
    ctx.lineWidth = 6; ctx.lineCap = "round";
    ctx.shadowColor = this.shootFlash > 0 ? "#ffdd44" : "transparent";
    ctx.shadowBlur = this.shootFlash > 0 ? 20 : 0;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(barrelLen, 0); ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(2, -2); ctx.lineTo(barrelLen - 2, -2); ctx.stroke();
    ctx.fillStyle = "#222233";
    ctx.fillRect(barrelLen - 4, -4, 6, 7);

    if (this.shootFlash > 0) {
      var intensity = this.shootFlash / 8;
      ctx.shadowColor = "#ffdd44"; ctx.shadowBlur = 40;
      ctx.fillStyle = 'rgba(255, 221, 68, ' + (intensity * 0.8) + ')';
      ctx.beginPath(); ctx.arc(barrelLen + 3, 0, 10 * intensity, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 255, 255, ' + (intensity * 0.5) + ')';
      ctx.beginPath(); ctx.arc(barrelLen + 3, 0, 5 * intensity, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();

    ctx.shadowBlur = 0;
    if (this.stunned) {
      ctx.font = "18px monospace"; ctx.textAlign = "center";
      ctx.fillStyle = "#ff66aa"; ctx.shadowColor = "#ff66aa"; ctx.shadowBlur = 20;
      ctx.fillText("\u26A1", 0, -s/2 - 10);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(255,255,255,' + (this.hp > 0 ? 0.7 : 0.3) + ')';
    ctx.font = "bold 10px monospace"; ctx.textAlign = "center";
    ctx.fillText(this.name, 0, s/2 + 16);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function createSpark(x, y, color) {
  var angle = Math.random() * Math.PI * 2;
  var speed = 2 + Math.random() * 5;
  return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
    life: 15 + Math.random() * 20, maxLife: 35, color, size: 2 + Math.random() * 3, type: "spark" };
}

function createExplosion(x, y, color, count, big) {
  if (!count) count = 30; if (!big) big = false;
  var c = count * (big ? 2 : 1);
  for (var i = 0; i < c; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = (big ? 2 : 1) + Math.random() * (big ? 8 : 4);
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
      life: 15 + Math.random() * 25, maxLife: 40,
      color: Math.random() < 0.3 ? "#ffffff" : color,
      size: (big ? 2 : 1) + Math.random() * (big ? 6 : 3), type: "spark" });
  }
  explosions.push({ x, y, radius: 2, maxRadius: big ? 60 : 35, alpha: 1, color, big });
}

function fireProjectile(fromX, fromY, toX, toY, weapon, attacker) {
  var dx = toX - fromX;
  var dy = toY - fromY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 5) return;
  var hits = weapon.special === "multi" ? 4 : 1;
  for (var i = 0; i < hits; i++) {
    var spread = weapon.special === "multi" ? 0.12 : 0;
    var angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * spread;
    var speed = weapon.speed + Math.random() * 3;
    projectiles.push({
      x: fromX, y: fromY,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      attacker: attacker,
      weapon: weapon,
      damage: weapon.damage,
      life: 90, size: weapon.size || 4, color: weapon.color, trail: [], idx: i,
    });
  }
}

function startGame() {
  var input = document.getElementById('nameInput');
  var pName = input ? input.value.trim() || "MechWarrior" : "MechWarrior";
  if (gameMode === 'multi') {
    if (!roomCode) { logToConsole('startGame MP: roomCode is null', 'err'); return; }
    if (gameActive) { logToConsole('startGame MP: game already active', 'warn'); return; }
    logToConsole('startGame MP: isHost=' + isHost + ' room=' + roomCode, 'info');
    enemyCount = 1;
    var playerStartX = isHost ? 150 : 650;
    player = new RobotArena(pName, playerStartX, 250, true);
    player.maxHp = 200;
    player.hp = 200;
    enemies = [];
    var oppStartX = isHost ? 650 : 150;
    if (!mpOpponent) {
      mpOpponent = new RobotArena('Opponent', oppStartX, 250, false);
      mpOpponent.color = '#ff4444';
      mpOpponent.isPlayer = false;
      mpOpponent.hp = 200;
      mpOpponent.maxHp = 200;
    } else {
      mpOpponent.x = oppStartX;
      mpOpponent.y = 250;
      mpOpponent.color = '#ff4444';
      mpOpponent.isPlayer = false;
    }
    enemies.push(mpOpponent);
    projectiles = []; explosions = []; particles = []; sparks = []; hitTexts = [];
    selectedWeapon = 0; gameActive = true; canShoot = true;
    shootCooldown = 0; comboCount = 0; comboTimer = 0; roundCount = 0; killCount = 0;
    screenShake.intensity = 0;
    document.getElementById('startScreen').style.display = 'none';
    var fireBtn = document.getElementById('fireBtn');
    if (controlMode === 'touch') {
      fireBtn.classList.add('show');
      document.getElementById('controlsHint').innerHTML = 'Joystick = drive + aim &nbsp;|&nbsp; Release = shoot &nbsp;|&nbsp; Tap = auto-aim &nbsp;|&nbsp; Red button = fire';
      document.querySelector('.weapon-bar').classList.add('touch-mode');
    } else {
      fireBtn.classList.remove('show');
      document.getElementById('controlsHint').innerHTML = '<kbd>W A S D</kbd> move &nbsp;|&nbsp; <kbd>1-5</kbd> weapon &nbsp;|&nbsp; <kbd>Click</kbd> / <kbd>Space</kbd> fire';
      document.querySelector('.weapon-bar').classList.remove('touch-mode');
    }
    updateWeaponBar();
    buildEnemyHpBars();
    updateHP();
    return;
  }
  player = new RobotArena(pName, 150, 250, true);
  player.maxHp = 200;
  player.hp = 200;
  enemies = [];
  var diffSpeed = [0.65, 1.0, 1.35];
  var diffHp = [80, 100, 120];
  var diffCooldownBase = [35, 20, 12];
  var diffCooldownRand = [30, 30, 20];
  var positions = getEnemyPositions(enemyCount);
  var used = {};
  for (var i = 0; i < enemyCount; i++) {
    var nameIdx;
    do { nameIdx = Math.floor(Math.random() * aiNames.length); } while (used[nameIdx]);
    used[nameIdx] = true;
    var ai = new RobotArena(aiNames[nameIdx], positions[i].x, positions[i].y, false);
    ai.speed = ai.speed * diffSpeed[difficulty];
    ai.hp = diffHp[difficulty];
    ai.maxHp = diffHp[difficulty];
    ai.diffDmgMult = [0.7, 1.0, 1.35][difficulty];
    ai.aiCooldown = diffCooldownBase[difficulty] + Math.random() * diffCooldownRand[difficulty];
    enemies.push(ai);
  }
  projectiles = []; explosions = []; particles = []; sparks = []; hitTexts = [];
  selectedWeapon = 0; gameActive = true; canShoot = true;
  shootCooldown = 0; comboCount = 0; comboTimer = 0; roundCount = 0; killCount = 0;
  screenShake.intensity = 0;
  document.getElementById('startScreen').style.display = 'none';
  // Show/hide touch controls
  var fireBtn = document.getElementById('fireBtn');
  if (controlMode === 'touch') {
    fireBtn.classList.add('show');
    document.getElementById('controlsHint').innerHTML = 'Joystick = drive + aim &nbsp;|&nbsp; Release = shoot &nbsp;|&nbsp; Tap = auto-aim &nbsp;|&nbsp; Red button = fire';
    document.querySelector('.weapon-bar').classList.add('touch-mode');
  } else {
    fireBtn.classList.remove('show');
    document.getElementById('controlsHint').innerHTML = '<kbd>W A S D</kbd> move &nbsp;|&nbsp; <kbd>1-5</kbd> weapon &nbsp;|&nbsp; <kbd>Click</kbd> / <kbd>Space</kbd> fire';
    document.querySelector('.weapon-bar').classList.remove('touch-mode');
  }
  updateWeaponBar();
  buildEnemyHpBars();
  updateHP();
}

function buildEnemyHpBars() {
  var container = document.getElementById('enemyHpRows');
  container.innerHTML = '';
  for (var i = 0; i < enemyCount; i++) {
    var div = document.createElement('div');
    div.className = 'hp-row';
    div.id = 'enemyRow' + i;
    div.innerHTML =
      '<span class="hp-label ai" id="eName' + i + '">Enemy</span>' +
      '<div class="hp-bar-outer"><div class="hp-bar-inner hp-green" id="eHpBar' + i + '" style="width:100%">100</div></div>' +
      '<span class="shield-badge" id="eShield' + i + '"></span>' +
      '<span class="stun-badge" id="eStun' + i + '"></span>';
    container.appendChild(div);
  }
}

function updateWeaponBar() {
  var bar = document.getElementById('weaponBar');
  bar.innerHTML = weapons.map(function(w, i) {
    return '<div class="w-btn ' + (i === selectedWeapon ? 'active' : '') + '" onclick="selectWeapon(' + i + ')">' +
      '<span class="key">' + (i + 1) + '</span>' +
      '<span class="wname" style="color:' + w.color + '">' + w.name + '</span></div>';
  }).join('');
}

function selectWeapon(i) { selectedWeapon = i; updateWeaponBar(); }

document.addEventListener('keydown', function(e) {
  keys[e.key.toLowerCase()] = true;
  var n = parseInt(e.key);
  if (n >= 1 && n <= 5) selectWeapon(n - 1);
  if ((e.key === ' ' || e.key === 'Space') && gameActive && canShoot && player && player.alive()) {
    e.preventDefault();
    playerShoot();
  }
});
document.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('click', function(e) {
  if (!gameActive || !player || !player.alive() || !canShoot) return;
  if (controlMode === 'touch') return; // touch uses fire button
  playerShoot();
});

// Fire button for touch
document.getElementById('fireBtn').addEventListener('touchstart', function(e) {
  e.preventDefault();
  e.stopPropagation();
  fireBtnHeld = true;
  if (gameActive && player && player.alive() && canShoot) playerShoot();
}, { passive: false });
document.getElementById('fireBtn').addEventListener('touchend', function(e) {
  fireBtnHeld = false;
});
document.getElementById('fireBtn').addEventListener('touchcancel', function(e) {
  fireBtnHeld = false;
});
document.getElementById('fireBtn').addEventListener('mousedown', function(e) {
  if (gameActive && player && player.alive() && canShoot) playerShoot();
});
document.getElementById('fireBtn').addEventListener('mouseup', function(e) {
  fireBtnHeld = false;
});

function playerShootAt(x, y) {
  mouseX = x; mouseY = y;
  playerShoot();
}

function playerShootAuto() {
  if (!player) return;
  var nearest = null, nearDist = Infinity;
  for (var ei = 0; ei < enemies.length; ei++) {
    if (!enemies[ei].alive()) continue;
    var dx = enemies[ei].x - player.x;
    var dy = enemies[ei].y - player.y;
    var d = dx*dx + dy*dy;
    if (d < nearDist) { nearDist = d; nearest = enemies[ei]; }
  }
  if (nearest) { mouseX = nearest.x; mouseY = nearest.y; }
  playerShoot();
}

// Fire button auto-fire in game loop

function playerShoot() {
  var w = weapons[selectedWeapon];
  if (w.special === "defend") {
    player.shield = 35;
    player.heal(10);
    createExplosion(player.x, player.y, "#44ddff", 20, false);
    player.shootFlash = 8;
    canShoot = false;
    shootCooldown = 25;
    updateHP();
    return;
  }
  var spread = w.special === "multi" ? 50 : 20;
  var tx = mouseX;
  var ty = mouseY;
  var angle = player.turretAngle;
  fireProjectile(player.x, player.y, tx, ty, w, player);
  player.shootFlash = 8;
  canShoot = false;
  shootCooldown = w.special === "multi" ? 28 : 15;
  if (gameMode === 'multi') sendShot(player.x, player.y, angle, selectedWeapon);
}

function getTargets(attacker) {
  if (attacker.isPlayer) return enemies;
  return [player];
}

function checkHit(proj) {
  var targets = getTargets(proj.attacker);
  for (var i = 0; i < targets.length; i++) {
    var t = targets[i];
    if (!t.alive()) continue;
    var dx = proj.x - t.x;
    var dy = proj.y - t.y;
    if (Math.sqrt(dx * dx + dy * dy) < 32) return t;
  }
  return null;
}

function processHits() {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    let target = checkHit(p);
    if (!target) continue;
    var w = p.weapon;
    if (w.special !== "multi" && Math.random() > w.accuracy) {
      createExplosion(p.x, p.y, "#888888", 8, false);
      addHitText(p.x, p.y, "MISS!", "#888888");
      projectiles.splice(i, 1);
      continue;
    }
    var dmg = w.damage * (p.attacker.diffDmgMult || 1);
    if (w.special === "stun") {
      target.takeDamage(dmg);
      createExplosion(p.x, p.y, w.color, 30, true);
      target.stunned = true;
      addHitText(p.x, p.y, Math.round(dmg) + " \u26A1", w.color);
      if (p.attacker.isPlayer) { comboCount++; comboTimer = 90; }
    } else if (w.special === "multi") {
      dmg = target.takeDamage(w.damage * (p.attacker.diffDmgMult || 1));
      createExplosion(p.x, p.y, w.color, 15, false);
      addHitText(p.x, p.y, '' + dmg, w.color);
    } else {
      dmg = target.takeDamage(w.damage * (p.attacker.diffDmgMult || 1));
      createExplosion(p.x, p.y, w.color, 25, dmg > 30);
      addHitText(p.x, p.y, '-' + dmg, dmg > 30 ? "#ffdd44" : w.color);
      if (p.attacker.isPlayer) { comboCount++; comboTimer = 90; }
    }
    projectiles.splice(i, 1);
    updateHP();
    if (!target.alive()) {
      killCount++;
      createExplosion(target.x, target.y, "#ff8800", 60, true);
      setTimeout(function() { createExplosion(target.x, target.y, "#ff4400", 40, true); }, 100);
      setTimeout(function() { createExplosion(target.x, target.y, "#ffdd00", 30, true); }, 200);
      screenShake.intensity = 15;
    }
    checkGameOver();
  }
}

function addHitText(x, y, text, color) {
  hitTexts.push({ x: x, y: y, text: text, color: color, life: 40, maxLife: 40, vy: -2 });
}

function allEnemiesDead() {
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].alive()) return false;
  }
  return true;
}

function checkGameOver() {
  var allDead = allEnemiesDead();
  if (gameMode === 'multi') {
    // In multiplayer, also end if opponent disconnects or dies
    if (!player.alive() || allDead) {
      gameActive = false;
      setTimeout(function() {
        var overlay = document.getElementById('gameOverlay');
        var title = document.getElementById('resultTitle');
        var msg = document.getElementById('resultMsg');
        var rounds = document.getElementById('resultRounds');
        if (player.alive() && allDead) {
          title.textContent = "\uD83C\uDFC6 VICTORY!";
          title.className = 'win';
          msg.textContent = player.name + ' wins the online battle!';
        } else if (!player.alive()) {
          title.textContent = "\uD83D\uDC80 DEFEATED";
          title.className = 'lose';
          msg.textContent = player.name + ' has been destroyed...';
        } else {
          title.textContent = "\uD83D\uDC4B OPPONENT LEFT";
          title.className = 'lose';
          msg.textContent = 'Opponent has disconnected';
        }
        rounds.textContent = 'Battle lasted ' + Math.max(1, roundCount) + ' rounds';
        overlay.classList.add('show');
      }, 500);
      return true;
    }
    return false;
  }
  if (!player.alive() || allEnemiesDead()) {
    gameActive = false;
    setTimeout(function() {
      var overlay = document.getElementById('gameOverlay');
      var title = document.getElementById('resultTitle');
      var msg = document.getElementById('resultMsg');
      var rounds = document.getElementById('resultRounds');
      if (player.alive()) {
        title.textContent = "\uD83C\uDFC6 VICTORY!";
        title.className = 'win';
        msg.textContent = player.name + ' defeats ' + killCount + ' opponent(s)!';
      } else {
        title.textContent = "\uD83D\uDC80 DEFEATED";
        title.className = 'lose';
        msg.textContent = player.name + ' has been destroyed...';
      }
      rounds.textContent = 'Battle lasted ' + Math.max(1, roundCount) + ' rounds';
      overlay.classList.add('show');
    }, 500);
    return true;
  }
  return false;
}

function updateHP() {
  if (!player || !enemies) return;
  var pct = (player.hp / player.maxHp) * 100;
  var pel = document.getElementById('pHpBar');
  if (pel) {
    pel.style.width = Math.max(0, pct) + '%';
    pel.textContent = Math.round(player.hp);
    pel.className = 'hp-bar-inner ' + (pct > 50 ? 'hp-green' : pct > 25 ? 'hp-orange' : 'hp-red');
  }
  document.getElementById('pShield').textContent = player.shield > 0 ? ('\uD83D\uDEE1 ' + player.shield) : '';
  document.getElementById('pStun').textContent = player.stunned ? '\u26A1 STUN' : '';

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var epct = (e.hp / e.maxHp) * 100;
    var eel = document.getElementById('eHpBar' + i);
    if (eel) {
      eel.style.width = Math.max(0, epct) + '%';
      eel.textContent = Math.round(e.hp);
      eel.className = 'hp-bar-inner ' + (epct > 50 ? 'hp-green' : epct > 25 ? 'hp-orange' : 'hp-red');
    }
    var en = document.getElementById('eName' + i);
    if (en) en.textContent = e.name;
    var es = document.getElementById('eShield' + i);
    if (es) es.textContent = e.shield > 0 ? ('\uD83D\uDEE1 ' + e.shield) : '';
    var estu = document.getElementById('eStun' + i);
    if (estu) estu.textContent = e.stunned ? '\u26A1 STUN' : '';
  }
}

function updateAI() {
  if (gameMode === 'multi') return;
  for (var ei = 0; ei < enemies.length; ei++) {
    var ai = enemies[ei];
    if (!ai.alive() || !player.alive()) continue;
    ai.aiCooldown--;
    var dx = player.x - ai.x;
    var dy = player.y - ai.y;
    var dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 120) {
      ai.targetX = ai.x - dx/dist * 60;
      ai.targetY = ai.y - dy/dist * 60;
    } else if (dist > 350) {
      ai.targetX = ai.x + dx/dist * 40;
      ai.targetY = ai.y + dy/dist * 40;
    } else if (Math.random() < 0.02) {
      ai.targetX = player.x + (Math.random() - 0.5) * 250;
      ai.targetY = player.y + (Math.random() - 0.5) * 200;
    }
    ai.targetX = Math.max(380, Math.min(W - 30, ai.targetX));
    ai.targetY = Math.max(55, Math.min(H - 30, ai.targetY));

    if (ai.aiCooldown <= 0 && dist < 550) {
      var choice;
      if (ai.hp <= 25) choice = 2;
      else if (player.hp <= 20 && Math.random() < 0.8) choice = 1;
      else if (player.hp > 70) choice = Math.random() < 0.6 ? 0 : 4;
      else if (Math.random() < 0.2) choice = 3;
      else choice = Math.floor(Math.random() * 5);

      var w = weapons[choice];
      if (w.special === "defend") {
        ai.shield = 35;
        ai.heal(10);
        createExplosion(ai.x, ai.y, "#44ddff", 20, false);
        ai.shootFlash = 8;
        ai.aiCooldown = 35 + Math.random() * 25;
      } else {
        var diffSpread = [1.5, 1.0, 0.7];
        var spread = (w.special === "multi" ? 60 : 25) * diffSpread[difficulty];
        fireProjectile(ai.x, ai.y, player.x + (Math.random() - 0.5) * spread, player.y + (Math.random() - 0.5) * spread, w, ai);
        ai.shootFlash = 8;
        ai.aiCooldown = 20 + Math.random() * 30;
        if (w.special === "multi") ai.aiCooldown += 20;
      }
    }
  }
}

function updateProjectiles() {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 12) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.997;
    p.vy *= 0.997;
    p.life--;
    if (p.life <= 0 || p.x < -30 || p.x > W + 30 || p.y < -30 || p.y > H + 30) {
      createExplosion(p.x, p.y, "#666688", 5, false);
      projectiles.splice(i, 1);
    }
  }
  processHits();
}

function drawHUD() {
  if (!gameActive || !player) return;
  var pw = weapons[selectedWeapon];
  if (pw) {
    ctx.fillStyle = pw.color; ctx.shadowColor = pw.color; ctx.shadowBlur = 8;
    ctx.font = "11px monospace"; ctx.textAlign = "center";
    ctx.fillText('[' + pw.name + ']', player.x, player.y + player.w/2 + 30);
    ctx.shadowBlur = 0;
  }
  if (comboCount > 1 && comboTimer > 0) {
    var display = document.getElementById('comboDisplay');
    display.textContent = comboCount + 'x COMBO!';
    display.classList.add('show');
    display.style.color = comboCount >= 5 ? '#ff4444' : comboCount >= 3 ? '#ffdd44' : '#44ddff';
  } else {
    document.getElementById('comboDisplay').classList.remove('show');
  }
  if (gameMode === 'multi') {
    ctx.fillStyle = 'rgba(255,255,200,0.3)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('MP: ' + (mpOpponent && mpOpponent.alive() ? 'Opponent active' : 'Waiting...') + ' | Enemies: ' + enemies.length, 10, H - 8);
    // Large status in the middle if there is no opponent
    if (!mpOpponent || !mpOpponent.alive() || enemies.length === 0) {
      ctx.fillStyle = 'rgba(255,200,0,0.5)';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('⏳ WAITING FOR OPPONENT...', W/2, H/2 - 40);
      ctx.fillStyle = 'rgba(255,255,200,0.3)';
      ctx.font = '12px monospace';
      ctx.fillText('mpOpponent: ' + (!!mpOpponent) + ' | enemies: ' + enemies.length + ' | alive: ' + (mpOpponent ? mpOpponent.alive() : 'n/a'), W/2, H/2 - 20);
    }
  }
}

function drawJoystick() {
  var cx = joystick.centerX, cy = joystick.centerY;
  var maxDist = 60;
  var knobX = cx + joystick.dx * maxDist * joystick.dist;
  var knobY = cy + joystick.dy * maxDist * joystick.dist;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, 50, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(knobX, knobY, 18, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(knobX, knobY, 8, 0, Math.PI * 2); ctx.fill();
}

function drawArena() {
  if (bgLoaded) {
    ctx.drawImage(bgImage, 0, 0, W, H);
  } else {
    var grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 400);
    grad.addColorStop(0, "#1a1a3a"); grad.addColorStop(0.5, "#12122a"); grad.addColorStop(1, "#080818");
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, H);
}

function drawParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.vy += 0.08; p.life--;
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (0.3 + alpha * 0.7), 0, Math.PI * 2); ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawExplosions() {
  for (var i = explosions.length - 1; i >= 0; i--) {
    var e = explosions[i];
    e.radius += e.big ? 2.5 : 1.8; e.alpha -= e.big ? 0.03 : 0.04;
    ctx.globalAlpha = Math.max(0, e.alpha);
    ctx.strokeStyle = e.color; ctx.lineWidth = e.big ? 4 : 2;
    ctx.shadowColor = e.color; ctx.shadowBlur = 30;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = e.color;
    ctx.globalAlpha = Math.max(0, e.alpha * 0.2);
    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius * 0.4, 0, Math.PI * 2); ctx.fill();
    if (e.alpha <= 0) explosions.splice(i, 1);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawProjectiles() {
  for (var pi = 0; pi < projectiles.length; pi++) {
    var p = projectiles[pi];
    ctx.shadowColor = p.color; ctx.shadowBlur = 20;
    for (var j = 0; j < p.trail.length; j++) {
      var alpha = (j / p.trail.length) * 0.7;
      ctx.globalAlpha = alpha; ctx.fillStyle = p.color;
      var s = p.size * (0.2 + (j / p.trail.length) * 0.8);
      ctx.beginPath(); ctx.arc(p.trail[j].x, p.trail[j].y, s, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawHitTexts() {
  for (var i = hitTexts.length - 1; i >= 0; i--) {
    var h = hitTexts[i];
    h.y += h.vy; h.vy *= 0.95; h.life--;
    var alpha = h.life / h.maxLife;
    ctx.globalAlpha = alpha; ctx.font = "bold 24px monospace"; ctx.textAlign = "center";
    ctx.fillStyle = h.color; ctx.shadowColor = h.color; ctx.shadowBlur = 20;
    ctx.fillText(h.text, h.x, h.y); ctx.shadowBlur = 0;
    if (h.life <= 0) hitTexts.splice(i, 1);
  }
  ctx.globalAlpha = 1;
}

function drawAimLine() {
  if (!player || !player.alive() || !aimActive) return;
  ctx.save();
  ctx.strokeStyle = aimDragged ? 'rgba(255,100,100,0.5)' : 'rgba(255,255,100,0.3)';
  ctx.lineWidth = aimDragged ? 1.5 : 1;
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(aimX, aimY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,100,0.4)';
  ctx.beginPath(); ctx.arc(aimX, aimY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function gameLoop() {
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= 0.9;
    if (screenShake.intensity < 0.5) screenShake.intensity = 0;
  } else { screenShake.x = 0; screenShake.y = 0; }

  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);
  ctx.clearRect(-10, -10, W + 20, H + 20);
  drawArena();

  if (gameActive) {
    if (!canShoot) { shootCooldown--; if (shootCooldown <= 0) canShoot = true; }
    if (comboTimer > 0) comboTimer--;
    if (controlMode === 'touch' && fireBtnHeld && canShoot && player && player.alive()) playerShoot();
    updateAI();
    updateProjectiles();
    player.update();
    for (var ei = 0; ei < enemies.length; ei++) {
      if (gameMode === 'multi' && enemies[ei] === mpOpponent) {
        // Interpolation to network target (smooth movement)
        enemies[ei].x += (enemies[ei].targetX - enemies[ei].x) * 0.2;
        enemies[ei].y += (enemies[ei].targetY - enemies[ei].y) * 0.2;
        enemies[ei].bodyAngle += (enemies[ei].targetBodyAngle - enemies[ei].bodyAngle) * 0.2;
        enemies[ei].turretAngle += (enemies[ei].targetTurretAngle - enemies[ei].turretAngle) * 0.2;
        if (enemies[ei].stunned && Math.random() < 0.008) enemies[ei].stunned = false;
        if (enemies[ei].shakeTimer > 0) enemies[ei].shakeTimer--;
        if (enemies[ei].hitFlash > 0) enemies[ei].hitFlash--;
        if (enemies[ei].shootFlash > 0) enemies[ei].shootFlash--;
      } else {
        enemies[ei].update();
      }
    }
    // Safety net: always keep opponent in multiplayer
    if (gameMode === 'multi') {
      if (!mpOpponent) {
        mpOpponent = new RobotArena('Opponent', isHost ? 650 : 150, 250, false);
        mpOpponent.color = '#ff4444';
        mpOpponent.isPlayer = false;
        mpOpponent.hp = 200;
        mpOpponent.maxHp = 200;
      }
      if (enemies.indexOf(mpOpponent) === -1) enemies.push(mpOpponent);
    }
    if (gameMode === 'multi' && player && player.alive() && mpChannel) {
      mpStateSendCounter = (mpStateSendCounter || 0) + 1;
      if (mpStateSendCounter % 3 === 0) upsertState();
      if (mpStateSendCounter % 180 === 0) upsertStateDB();
    }
    if (gameMode === 'multi' && mpOpponent) {
      mpDisconnectTimer++;
      if (mpDisconnectTimer > 300 && gameActive) {
        gameActive = false;
        setTimeout(function() {
          document.getElementById('resultTitle').textContent = "\uD83D\uDC4B OPPONENT LEFT";
          document.getElementById('resultTitle').className = 'lose';
          document.getElementById('resultMsg').textContent = 'Opponent has disconnected';
          document.getElementById('resultRounds').textContent = 'Battle lasted ' + Math.max(1, roundCount) + ' rounds';
          document.getElementById('gameOverlay').classList.add('show');
        }, 500);
      }
    }
    if (player.stunned && Math.random() < 0.008) player.stunned = false;
    for (var ei2 = 0; ei2 < enemies.length; ei2++) {
      if (enemies[ei2].stunned && Math.random() < 0.008) enemies[ei2].stunned = false;
    }
    roundCount++;
  }

  drawParticles();
  drawExplosions();
  drawProjectiles();
  drawAimLine();
  drawHitTexts();

  if (player && player.alive()) player.draw();
  for (var ei3 = 0; ei3 < enemies.length; ei3++) {
    if (enemies[ei3].alive()) {
      enemies[ei3].draw();
      // Label above opponent in multiplayer
      if (gameMode === 'multi') {
        ctx.fillStyle = 'rgba(255,100,100,0.8)';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('⚔ ' + enemies[ei3].name, enemies[ei3].x, enemies[ei3].y - 40);
        if (enemies[ei3].weapon !== undefined) {
          var w = weapons[enemies[ei3].weapon];
          if (w) {
            ctx.fillStyle = w.color;
            ctx.font = '10px monospace';
            ctx.fillText('[' + w.name + ']', enemies[ei3].x, enemies[ei3].y - 28);
          }
        }
      }
    }
  }

  if (gameActive) drawHUD();
  ctx.restore();
  if (controlMode === 'touch' && joystick.active) drawJoystick();
  updateHP();
  requestAnimationFrame(gameLoop);
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w/2) r = w/2; if (r > h/2) r = h/2;
    this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    return this;
  };
}

gameLoop();
</script>
</body>
